<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>于洋 · Yu Yang</title>
  <meta name="description" content="于洋的个人主页 — Yu Yang's personal page." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👋</text></svg>" />
  <style>
    :root {
      --bg-start: #fdfbfb;
      --bg-end: #ebedee;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 255, 255, 0.45);
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.1);
      --shadow: 0 20px 50px -12px rgba(31, 41, 55, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-start: #0f172a;
        --bg-end: #1e293b;
        --card-bg: rgba(30, 41, 59, 0.65);
        --card-border: rgba(148, 163, 184, 0.15);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --accent: #818cf8;
        --accent-soft: rgba(129, 140, 248, 0.15);
        --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 48px 40px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      text-align: center;
    }

    .avatar {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
      font-weight: 600;
      letter-spacing: -1px;
      box-shadow: 0 8px 24px rgba(129, 140, 248, 0.35);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 28px;
    }

    .about {
      color: var(--text-primary);
      font-size: 15px;
      text-align: left;
      padding: 20px 22px;
      background: var(--accent-soft);
      border-radius: 12px;
      margin-bottom: 28px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .links a:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .links svg {
      width: 16px;
      height: 16px;
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
